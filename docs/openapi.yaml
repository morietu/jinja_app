openapi: 3.0.3
info:
  title: 神社_APP API (MVP)
  version: 0.1.0
  description: >
    神社_APP の最小MVP向けAPI定義。人気神社、最寄神社、コンシェルジュ履歴、経路取得を提供します。
  contact:
    name: Jinja_APP Team
    email: dev@example.com
servers:
  - url: http://127.0.0.1:8000

tags:
  - name: Shrines
    description: 神社の検索・ランキングなど
  - name: Concierge
    description: コンシェルジュ機能の履歴参照
  - name: Routes
    description: 経路検索（距離・時間・ポリライン）

paths:
  /api/populars/:
    get:
      summary: 人気神社の最小一覧（30日スコア順）
      description: 直近期間の人気スコアで並べた神社一覧を返します。最小形のレスポンスのみを返却します。
      tags: [Shrines]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PopularsResponse"

  /api/shrines/nearest/:
    get:
      summary: 現在地から近い神社（最小情報）
      description: 指定された緯度経度から近い神社を距離順で返します。distance_m は必須、所要時間は任意です。
      tags: [Shrines]
      parameters:
        - in: query
          name: lat
          schema: { type: number }
          required: true
        - in: query
          name: lng
          schema: { type: number }
          required: true
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NearestResponse"

  /api/concierges/histories/:
    get:
      summary: コンシェルジュ履歴一覧
      description: これまでの相談履歴（スレッド）を、最終メッセージ時刻の降順で返します。
      tags: [Concierge]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedConciergeHistoryList"

  /api/concierges/histories/{id}/:
    get:
      summary: コンシェルジュ履歴の詳細（会話ログ）
      description: 1件の履歴（スレッド）と、その中のメッセージ一覧を返します。
      tags: [Concierge]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConciergeHistoryDetail"

  /api/concierge/chat/:
    post:
      tags: [Concierge]
      summary: Concierge chat recommendations
      description: >
        コンシェルジュ推薦を返す。契約フィールドは data._need / recommendations[].breakdown / data._signals.mode を保証する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConciergeChatRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConciergeChatResponse"


  /api/directions/:
    get:
      summary: 単一経路の最小結果（エンコードポリライン付き）
      description: origin/dest を lat,lng 文字列で受け取り、距離・時間・ポリラインのみ返します。
      tags: [Routes]
      parameters:
        - in: query
          name: origin
          description: "lat,lng（例: 35.681236,139.767125）"
          schema: { type: string, pattern: "^-?\\d+\\.?\\d*,-?\\d+\\.?\\d*$" }
          required: true
        - in: query
          name: dest
          description: "lat,lng（例: 35.658034,139.701636）"
          schema: { type: string, pattern: "^-?\\d+\\.?\\d*,-?\\d+\\.?\\d*$" }
          required: true
        - in: query
          name: mode
          schema:
            type: string
            enum: [walking, driving]
          required: false
          description: 省略時は walking
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectionsResponse"


components:
  schemas:
    ShrineLite:
      type: object
      required: [id, name, lat, lng]
      properties:
        id: { type: integer, example: 123 }
        name: { type: string, example: "明治神宮" }
        lat: { type: number, format: double, example: 35.6764 }
        lng: { type: number, format: double, example: 139.6993 }
        address:
          type: string
          nullable: true
          example: "東京都渋谷区代々木神園町1-1"

    PopularItem:
      type: object
      required: [shrine, score]
      properties:
        shrine: { $ref: "#/components/schemas/ShrineLite" }
        score: { type: number, example: 87.3 }
        period_days: { type: integer, example: 30 }

    PopularsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PopularItem" }

    NearestItem:
      type: object
      required: [shrine, distance_m]
      properties:
        shrine: { $ref: "#/components/schemas/ShrineLite" }
        distance_m: { type: integer, example: 420 }
        walking_minutes:
          type: number
          nullable: true
          example: 6
        driving_minutes:
          type: number
          nullable: true
          example: 2

    NearestResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/NearestItem" }



    DirectionsResponse:
      type: object
      required: [mode, distance_m, duration_min, polyline]
      properties:
        mode:
          type: string
          enum: [walking, driving]
          example: walking
        distance_m:
          type: integer
          example: 1850
        duration_min:
          type: number
          example: 24.5
        polyline:
          type: string
          description: "Google/Mapbox 互換のエンコードポリライン"
          example: "}a~vF|y`uO??_seK`@"

    ConciergeMessage:
      type: object
      required: [id, role, content, created_at]
      properties:
        id:
          type: integer
          example: 123
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        created_at:
          type: string
          format: date-time

    ConciergeHistory:  # = Thread 1件分（一覧用）
      type: object
      required: [id, created_at, updated_at, last_message_at, message_count]
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          nullable: true
        last_message:
          type: string
          description: "最後のメッセージ本文（先頭数百文字程度）"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_message_at:
          type: string
          format: date-time
        message_count:
          type: integer
          example: 5

    PaginatedConciergeHistoryList:
      type: object
      required: [count, results]
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          format: uri
          nullable: true
        previous:
          type: string
          format: uri
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/ConciergeHistory"

    ConciergeHistoryDetail:
      type: object
      required: [id, created_at, updated_at, last_message_at, message_count, messages]
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_message_at:
          type: string
          format: date-time
        message_count:
          type: integer
          example: 5
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ConciergeMessage"
    
        # ----------------------------
    # Concierge Chat (contract)
    # ----------------------------

    ConciergeChatRequest:
      type: object
      required: [message, candidates]
      properties:
        message:
          type: string
          description: "ユーザー入力（message/query のどちらかは必須運用だが、契約は message を基準にする）"
        query:
          type: string
          nullable: true
          description: "互換用: message の別名"
        birthdate:
          type: string
          nullable: true
          example: "1984-05-15"
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        goriyaku_tag_ids:
          type: array
          nullable: true
          items: { type: integer }
        extra_condition:
          type: string
          nullable: true
        flow:
          type: string
          nullable: true
          enum: ["A", "B"]
        candidates:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name: { type: string }
              formatted_address: { type: string, nullable: true }
              address: { type: string, nullable: true }
              lat: { type: number, nullable: true }
              lng: { type: number, nullable: true }
              distance_m: { type: number, nullable: true }
              place_id: { type: string, nullable: true }
              shrine_id: { type: integer, nullable: true }
              goriyaku_tag_ids:
                type: array
                nullable: true
                items: { type: integer }
              popular_score: { type: number, nullable: true }

    ConciergeNeed:
      type: object
      required: [tags, hits]
      additionalProperties: false
      properties:
        tags:
          type: array
          maxItems: 3
          items: { type: string }
        hits:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    ConciergeBreakdownWeights:
      type: object
      required: [element, need, popular]
      additionalProperties: false
      properties:
        element: { type: number }
        need: { type: number }
        popular: { type: number }

    ConciergeBreakdown:
      type: object
      required:
        - score_element
        - score_need
        - score_popular
        - score_total
        - weights
        - matched_need_tags
      additionalProperties: true
      properties:
        score_element: { type: integer }
        score_need: { type: integer }
        score_popular:
          type: number
          minimum: 0
          maximum: 1
        score_total: { type: number }
        weights:
          $ref: "#/components/schemas/ConciergeBreakdownWeights"
        matched_need_tags:
          type: array
          items: { type: string }

    ConciergeSignalsMode:
      type: object
      required: [flow, weights, astro_bonus_enabled]
      additionalProperties: true
      properties:
        flow: { type: string, enum: ["A", "B"] }
        weights:
          $ref: "#/components/schemas/ConciergeBreakdownWeights"
        astro_bonus_enabled: { type: boolean }
        description: { type: string, nullable: true }
        ui_label_ja: { type: string, nullable: true }
        ui_note_ja: { type: string, nullable: true }

    ConciergeSignals:
      type: object
      required: [mode]
      additionalProperties: true
      properties:
        mode:
          $ref: "#/components/schemas/ConciergeSignalsMode"
        # 他は運用で増えるので optional のまま
        result_state:
          type: object
          nullable: true
        llm:
          type: object
          nullable: true

    ConciergeRecommendation:
      type: object
      required: [name, reason, breakdown]
      additionalProperties: true
      properties:
        name: { type: string }
        reason: { type: string }
        breakdown:
          $ref: "#/components/schemas/ConciergeBreakdown"

        # --- 以下は運用で付く/付かないので optional ---
        location: { type: string, nullable: true }
        display_name: { type: string, nullable: true }
        lat: { type: number, nullable: true }
        lng: { type: number, nullable: true }
        distance_m: { type: number, nullable: true }
        place_id: { type: string, nullable: true }
        shrine_id: { type: integer, nullable: true }
        popular_score: { type: number, nullable: true }
        astro_priority: { type: integer, nullable: true }
        astro_elements:
          type: array
          nullable: true
          items: { type: string }
        astro_tags:
          type: array
          nullable: true
          items: { type: string }

    ConciergeChatData:
      type: object
      required: [_need, recommendations, _signals]
      additionalProperties: true
      properties:
        _need:
          $ref: "#/components/schemas/ConciergeNeed"
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/ConciergeRecommendation"
        _signals:
          $ref: "#/components/schemas/ConciergeSignals"

    ConciergeChatResponse:
      type: object
      required: [ok, data]
      additionalProperties: true
      properties:
        ok: { type: boolean }
        data:
          $ref: "#/components/schemas/ConciergeChatData"
