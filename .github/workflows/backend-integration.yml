name: backend-integration
on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main','develop']
  workflow_dispatch: {}
concurrency:
  group: backend-integration-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  call:
    uses: ./.github/workflows/backend-tests.yml
    with:
      mode: integration
      concierge_throttle: "100/min"
    secrets:
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
