name: backend-integration
permissions:
  contents: read
permissions:
  contents: read
on:
  push:
    branches: [ develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-integration.yml'
  workflow_dispatch:
    inputs:
      concierge_throttle:
        description: "DRF throttle for concierge"
        type: string
        default: 100/min

concurrency:
  group: backend-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  call:
    uses: ./.github/workflows/backend-tests.yml
    with:
      mode: integration
      concierge_throttle: ${{ inputs.concierge_throttle || '100/min' }}
    secrets:
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
