name: Contract CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  openapi-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          standalone: true
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm -v
      # npx -y spectral を使っているなら install 不要
      - name: Lint OpenAPI (non-strict)
        run: pnpm lint:openapi

  web-contract-test:
    needs: openapi-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          standalone: true
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm -v

      # ここが肝：ワークスペース全体の依存を解決
      - name: Install all workspace deps
        run: pnpm -r install --frozen-lockfile

      # 任意のデバッグ（必要になったら残すと便利）
      # - name: Debug vitest resolution
      #   run: pnpm why -r vitest || true

      - name: Run web contract test
        working-directory: apps/web
        env:
          OPENAPI: ../../docs/openapi.yaml
        run: pnpm test:contract
