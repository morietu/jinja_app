name: Contract CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  openapi-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node / pnpm を確実に固定（corepackは使わず）
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.3        # packageManager と合わせる
          standalone: true

      - name: Install deps (workspace root)
        run: pnpm -w install --frozen-lockfile

      # Spectral は devDeps に入っているのでそのまま script でOK
      - name: Lint OpenAPI (non-strict)
        run: pnpm lint:openapi

  web-contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.3
          standalone: true

      # ★ ルートでインストール（ロックはルートにあるため）
      - name: Install deps (workspace root)
        run: pnpm -w install --frozen-lockfile

      # ★ テスト実行は web 配下
      - name: Run contract tests (Vitest + MSW)
        working-directory: apps/web
        run: pnpm test:contract
