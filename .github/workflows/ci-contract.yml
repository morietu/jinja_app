name: Contract CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  openapi-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) 先に pnpm を入れる（standalone で corepack 非依存）
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          standalone: true
          run_install: false

      # 2) 次に Node + pnpm キャッシュ
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Check pnpm version
        run: pnpm -v

      - name: Install deps (workspace root)
        run: pnpm -w install --frozen-lockfile

      - name: Lint OpenAPI (non-strict)
        run: pnpm lint:openapi

  web-contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) 先に pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          standalone: true
          run_install: false

      # 2) 次に Node + pnpm キャッシュ
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Check pnpm version
        run: pnpm -v

      # ルートに lockfile があるのでルートでインストール
      - name: Install deps (workspace root)
        run: pnpm -w install --frozen-lockfile

      # web 配下の契約テスト実行
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Check pnpm version
        run: pnpm -v
      - name: Install deps (workspace root)
        run: pnpm -w install --frozen-lockfile
      - name: Install deps (web)
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Run web contract test
        working-directory: apps/web
        env:
          OPENAPI: ../../docs/openapi.yaml
        run: pnpm test:contract

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Enable corepack (fallback)
        run: corepack enable

      - name: Install deps (web)
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Run web contract test
        working-directory: apps/web
        env:
          OPENAPI: ../../docs/openapi.yaml
        run: pnpm test:contract
