name: web-contract-test

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - '*'

jobs:
  web-contract-test:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          standalone: true
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm -v
      - name: Install all workspace deps
        run: pnpm --filter ./apps/web install --frozen-lockfile
      - name: Run web contract tests
        run: pnpm --filter ./apps/web test:contract
