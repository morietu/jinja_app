name: Contract CI

on:
  workflow_dispatch: {}
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  openapi-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) pnpm を入れる（standalone で corepack 非依存）
      - uses: pnpm/action-setup@v4
        with:
          standalone: true
          run_install: false

      # 2) Node + pnpm キャッシュ
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # 3) packageManager の pnpm に揃える（バージョン指定なし）
      - name: Setup pnpm (from packageManager)
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          standalone: true
          package_json_file: package.json

      - name: Check pnpm version
        run: pnpm -v

      - name: Install deps (workspace root)
        run: pnpm -w install --frozen-lockfile

      - name: Lint OpenAPI (non-strict)
        run: pnpm lint:openapi

  web-contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) pnpm
      - uses: pnpm/action-setup@v4
        with:
          standalone: true
          run_install: false

      # 2) Node + pnpm キャッシュ
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Check pnpm version
        run: pnpm -v

      # 3) ルートに lockfile があるのでルートでインストール
      - name: Install deps (workspace root)
        run: pnpm -w install --frozen-lockfile

      # 4) web 配下の契約テスト
      - name: Run web contract test
        working-directory: apps/web
        env:
          OPENAPI: ../../docs/openapi.yaml
        run: pnpm test:contract
