name: web-tests
permissions:
  contents: read
on:
  push:
    branches: [develop]
    paths: ["apps/web/**", ".github/workflows/web-tests.yml"]
  pull_request:
    branches: [develop]
    paths: ["apps/web/**", ".github/workflows/web-tests.yml"]


concurrency:
  group: web-tests-${{ github.ref }}
  cancel-in-progress: true


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          standalone: true
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps (workspace root)
        run: pnpm -r install --frozen-lockfile

      
      # （以降はそのまま）
      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: apps/web/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('apps/web/**/*.{ts,tsx,js,jsx,mjs,cjs}') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      - name: Lint (ESLint)
        working-directory: apps/web
        run: pnpm exec eslint . --cache --cache-location .eslintcache

      - name: Type check (tsc)
        working-directory: apps/web
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Guard - no direct backend access in client code
        working-directory: apps/web
        run: pnpm guard:no-backend-direct

      - name: Test with coverage
        working-directory: apps/web
        run: pnpm test:cov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-lcov
          path: apps/web/coverage/lcov.info
          if-no-files-found: ignore

      - name: Fail on untracked files (post-build)
        if: always()
        run: |
          UNTRACKED="$(git ls-files --others --exclude-standard \
            | grep -vE '^(apps/web/coverage/|apps/web/playwright-report/|apps/web/.next/)$' || true)"
          if [ -n "$UNTRACKED" ]; then
            echo "⚠️ Untracked files found:"
            echo "$UNTRACKED"
            exit 1
          fi

      

      
