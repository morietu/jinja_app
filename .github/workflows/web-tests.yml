name: web-tests
permissions:
  contents: read
on:
  push:
    paths: ["apps/web/**", ".github/workflows/web-tests.yml"]
  pull_request:
    paths: ["apps/web/**", ".github/workflows/web-tests.yml"]



concurrency:
  group: web-tests-${{ github.ref }}
  cancel-in-progress: true


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          standalone: true
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps (workspace root)
        run: pnpm -r install --frozen-lockfile

      # ✅ Playwright のブラウザ + 必要なシステム依存を CLI でインストール
      - name: Install Playwright (browsers + system deps)
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps

      # （以降はそのまま）
      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: apps/web/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('apps/web/**/*.{ts,tsx,js,jsx,mjs,cjs}') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      - name: Lint (ESLint)
        working-directory: apps/web
        run: pnpm exec eslint . --cache --cache-location .eslintcache

      - name: Type check (tsc)
        working-directory: apps/web
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Test with coverage
        working-directory: apps/web
        run: pnpm test:cov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-lcov
          path: apps/web/coverage/lcov.info
          if-no-files-found: ignore

      - name: Fail on untracked files (post-build)
        if: always()
        run: |
          UNTRACKED="$(git ls-files --others --exclude-standard \
            | grep -vE '^(apps/web/coverage/|apps/web/playwright-report/|apps/web/.next/)$' || true)"
          if [ -n "$UNTRACKED" ]; then
            echo "⚠️ Untracked files found:"
            echo "$UNTRACKED"
            exit 1
          fi

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6

      - name: Upload Playwright traces/videos/screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            apps/web/test-results/**/*.zip
            apps/web/test-results/**/*.webm
            apps/web/test-results/**/*.png
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6
