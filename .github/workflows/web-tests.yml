name: web-ci

permissions:
  contents: read

on:
  workflow_dispatch:

  push:
    branches: [develop, main]
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/web-tests.yml"

  pull_request:
    branches: ["*"]
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/web-tests.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: web-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          standalone: true
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # 速さ優先: webだけ入れる
      - name: Install deps (web only)
        run: pnpm --filter ./apps/web install --frozen-lockfile

      - name: Contract tests
        run: pnpm --filter ./apps/web test:contract

  full:
    name: web-full
    runs-on: ubuntu-latest

    # ✅ 重いジョブは絞る（必要なら条件変更）
    # PRではweb変更時だけ / push(develop/main)もweb変更時だけ走る
    if: ${{ github.event_name != 'workflow_dispatch' || true }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          standalone: true
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # 既存の方式を踏襲: workspace rootで入れる（lint/guardが横断依存ならこれ）
      - name: Install deps (workspace root)
        run: pnpm -r install --frozen-lockfile

      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: apps/web/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('apps/web/**/*.{ts,tsx,js,jsx,mjs,cjs}') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      - name: Lint (ESLint)
        working-directory: apps/web
        run: pnpm exec eslint . --cache --cache-location .eslintcache

      - name: Type check (tsc)
        working-directory: apps/web
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Guard - no direct backend access in client code
        working-directory: apps/web
        run: pnpm guard:no-backend-direct

      - name: Test with coverage
        working-directory: apps/web
        run: pnpm test:cov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-lcov
          path: apps/web/coverage/lcov.info
          if-no-files-found: ignore

      - name: Fail on untracked files (post-build)
        if: always()
        run: |
          UNTRACKED="$(git ls-files --others --exclude-standard \
            | grep -vE '^(apps/web/coverage/|apps/web/playwright-report/|apps/web/.next/)$' || true)"
          if [ -n "$UNTRACKED" ]; then
            echo "⚠️ Untracked files found:"
            echo "$UNTRACKED"
            exit 1
          fi

      - name: Guard - no NEXT_PUBLIC in server code
        working-directory: apps/web
        run: pnpm guard:no-next-public-in-server
