name: backend-unit
on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main','develop']
concurrency:
  group: backend-unit-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  call:
    uses: ./.github/workflows/backend-tests.yml
    with:
      mode: unit
      concierge_throttle: "1000/min"
