name: backend-unit
on:
  push:
    paths: ["backend/**", ".github/workflows/backend-unit.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-unit.yml"]

concurrency:
  group: backend-unit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  call:
    uses: ./.github/workflows/backend-tests.yml
    with:
      mode: unit
      concierge_throttle: "1000/min"
