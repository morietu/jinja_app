name: backend-tests

on:
  workflow_call:
    inputs:
      mode:
        type: string
        required: false
        default: unit
      concierge_throttle:
        type: string
        required: false
        default: 1000/min
    secrets:
      GOOGLE_MAPS_API_KEY: { required: false }
      GOOGLE_PLACES_API_KEY: { required: false }
  workflow_dispatch:
    inputs:
      mode:
        description: "unit or integration"
        type: choice
        options: [unit, integration]
        default: unit
      concierge_throttle:
        description: "DRF throttle for concierge"
        type: string
        default: 1000/min

permissions: { contents: read }

# ここは MODE をやめ、必要なものだけ残す
env:
  CONCIERGE_THROTTLE: ${{ inputs.concierge_throttle || '1000/min' }}

jobs:
  unit:
    if: ${{ inputs.mode != 'integration' }}
    runs-on: ubuntu-24.04
    concurrency:
      group: backend-tests-unit-${{ github.ref }}
      cancel-in-progress: true
    env:
      CI: "true"
      DJANGO_SETTINGS_MODULE: shrine_project.settings
      PYTHONPATH: ${{ github.workspace }}/backend
      IS_PYTEST: "1"
      DISABLE_GIS_FOR_TESTS: "1"
      USE_SQLITE: "1"
      USE_GIS: "0"
      USE_LLM_CONCIERGE: "0"
      AUTO_GEOCODE_ON_SAVE: "0"
      # ✅ グローバル env を参照
      CONCIERGE_THROTTLE: ${{ inputs.concierge_throttle }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY || 'dummy' }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY || 'dummy' }}
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      ROUTE_PROVIDER: "dummy"
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Show import path & locate temples
        shell: bash
        run: |
          python - <<'PY'
          import sys, importlib
          print("=== sys.path ===")
          print("\n".join(sys.path))
          print("=== try import temples ===")
          try:
              m = importlib.import_module("temples")
              print("temples OK:", m, getattr(m, "__file__", None))
          except Exception as e:
              print("temples NG:", repr(e))
          PY

      - name: Run pytest (unit, sqlite)
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          python -V
          python -c "import django,sys;print('django', django.get_version());print(sys.version)"
          python -m pytest -vv -ra --maxfail=1 --durations=10 -p pytest_django -p pytest_env

  integration:
    if: ${{ inputs.mode == 'integration' }}
    runs-on: ubuntu-24.04
    concurrency:
      group: backend-tests-integration-${{ github.ref }}
      cancel-in-progress: true
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: jinja_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: jdb50515
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U admin -d jinja_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 60
          --health-start-period 60s
    env:
      CI: "true"
      DJANGO_SETTINGS_MODULE: shrine_project.settings
      PYTHONPATH: ${{ github.workspace }}/backend
      IS_PYTEST: "1"
      USE_SQLITE: "0"
      USE_GIS: "1"
      USE_LLM_CONCIERGE: "0"
      AUTO_GEOCODE_ON_SAVE: "0"
      DATABASE_URL: postgis://admin:jdb50515@localhost:5432/jinja_db
      # ✅ グローバル env を参照
      CONCIERGE_THROTTLE: ${{ inputs.concierge_throttle || '1000/min' }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY || 'dummy' }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY || 'dummy' }}
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      ROUTE_PROVIDER: "dummy"
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Cache & install apt packages (GIS)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >
            gdal-bin libgdal-dev libgeos-dev postgresql-client jq
            libblas3 liblapack3 libopenblas0
          version: 1

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Wait for DB
        run: |
          for i in $(seq 1 60); do
            pg_isready -h localhost -p 5432 -U admin -d jinja_db && break
            if [ $((i % 10)) -eq 0 ]; then echo "waiting for Postgres... ($i/60)"; fi
            sleep 2
          done
          pg_isready -h localhost -p 5432 -U admin -d jinja_db

      - name: Show import path & locate temples
        shell: bash
        run: |
          python - <<'PY'
          import sys, importlib
          print("=== sys.path ===")
          print("\n".join(sys.path))
          print("=== try import temples ===")
          try:
              m = importlib.import_module("temples")
              print("temples OK:", m, getattr(m, "__file__", None))
          except Exception as e:
              print("temples NG:", repr(e))
          PY
      - name: Show effective settings flags
        run: |
          echo "ENV USE_GIS=${USE_GIS}"
          python - <<'PY'
          import django
          from django.conf import settings
          django.setup()
          print(f"[settings-check] USE_GIS={getattr(settings,'USE_GIS',None)} "
                f"ENGINE={settings.DATABASES['default']['ENGINE']}")
          PY

      - name: Run pytest (integration, postgis)
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          python -V
          python -c "import django,sys;print('django', django.get_version());print(sys.version)"
          python -m pytest -vv -ra --maxfail=1 --durations=10 -p pytest_django -p pytest_env

      - name: Show DB container logs (always)
        if: always()
        run: |
          docker ps -a --format '{{.ID}} {{.Image}} {{.Names}} {{.Status}}'
          CID="$(docker ps -a --filter 'ancestor=postgis/postgis:16-3.4' --format '{{.ID}}' | head -n1)"
          if [ -n "$CID" ]; then
            echo "==== docker inspect (health) ===="
            docker inspect "$CID" --format '{{json .State.Health}}' | jq . || true
            echo "==== docker logs $CID ===="
            docker logs "$CID" || true
          else
            echo "No postgis container found"
          fi

      # .github/workflows/backend-tests.yml（reusable）
