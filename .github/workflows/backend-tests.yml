name: backend-tests

on:
  workflow_call:
    inputs:
      concierge_throttle:
        description: "DRF throttle for concierge"
        type: string
        required: false
        default: "1000/min"
      use_gis:
        description: "Enable GIS deps"
        type: boolean
        required: false
        default: true
    secrets:
      GOOGLE_MAPS_API_KEY:
        required: false
      GOOGLE_PLACES_API_KEY:
        required: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-lates
    concurrency:
      group: backend-tests-${{ github.ref }}
      cancel-in-progress: true

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: jinja_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: jdb50515
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U admin -d jinja_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 60
          --health-start-period 60s

    env:
      CI: "true"
      DJANGO_SETTINGS_MODULE: shrine_project.settings
      USE_GIS: ${{ inputs.use_gis && '1' || '0' }}
      USE_LLM_CONCIERGE: "0"
      AUTO_GEOCODE_ON_SAVE: "0"
      DATABASE_URL: postgis://admin:jdb50515@localhost:5432/jinja_db
      DJANGO_SECRET_KEY: ci-only-secre
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY || 'dummy' }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY || 'dummy' }}
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      ROUTE_PROVIDER: "dummy"
      CONCIERGE_THROTTLE: ${{ inputs.concierge_throttle }}

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkou
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev postgresql-client jq

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.tx

      - name: Wait for DB
        run: |
          for i in $(seq 1 90); do
            pg_isready -h localhost -p 5432 -U admin -d jinja_db && break
            echo "waiting for Postgres... ($i/90)"
            sleep 2
          done
          pg_isready -h localhost -p 5432 -U admin -d jinja_db

      - name: Run tests via Makefile (repo root)
        working-directory: .
        run: make tes

      - name: Show DB container logs (always)
        if: always()
        run: |
          docker ps -a --format '{{.ID}} {{.Image}} {{.Names}} {{.Status}}'
          CID="$(docker ps -a --filter 'ancestor=postgis/postgis:16-3.4' --format '{{.ID}}' | head -n1)"
          if [ -n "$CID" ]; then
            echo "==== docker inspect (health) ===="
            docker inspect "$CID" --format '{{json .State.Health}}' | jq . || true
            echo "==== docker logs $CID ===="
            docker logs "$CID" || true
          else
            echo "No postgis container found"
          fi

      - name: Debug throttle env & settings
        run: |
          echo "DISABLE_THROTTLE=${DISABLE_THROTTLE}"
          python -c "import os, django; os.environ.setdefault('DJANGO_SETTINGS_MODULE','shrine_project.settings'); django.setup(); from django.conf import settings; print('THROTTLES:', settings.REST_FRAMEWORK.get('DEFAULT_THROTTLE_RATES'))"
