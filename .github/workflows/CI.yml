name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jinja_db
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PYTHONPATH: backend
      DJANGO_SETTINGS_MODULE: shrine_project.settings
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jinja_db
      USE_GIS: "1"
      USE_SQLITE: "0"
      IS_PYTEST: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 任意：GDALが必要なら（いまはテストskip想定なので省略可）
      - name: (optional) Install GDAL libs
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev

      - name: Upgrade pip
        run: python -m pip install -U pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Wait for DB
        run: |
          for i in {1..60}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 1
          done

      - name: Migrate
        run: python -m django migrate --noinput

      - name: Run tests
        run: pytest -q
