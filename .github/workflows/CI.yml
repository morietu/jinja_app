# .github/workflows/CI.yml
name: CI
permissions:
  contents: read

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    uses: ./.github/workflows/backend-tests.yml
    with:
      concierge_throttle: "1000/min"
      use_gis: true
    secrets: inherit

  # 例: 他のワークフローを呼ぶ場合
  # web:
  #   uses: ./.github/workflows/web-tests.yml
  #   secrets: inherit
