name: backend-tests

on:
  push:
    branches: [develop, main, master, "feature/**", "fix/**"]
  pull_request:
    branches: [develop, main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jinja_db
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jinja_db
      DJANGO_SETTINGS_MODULE: shrine_project.settings
      PYTHONPATH: backend
      USE_GIS: "1"
      USE_SQLITE: "0"
      IS_PYTEST: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install system libs (GDAL/GEOS/PROJ)
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev proj-bin libproj-dev

      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install -U pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install -r requirements.txt

      - name: Wait for DB
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 1
          done

      - name: Smoke check migrations (optional)
        working-directory: backend
        run: |
          python -m django --version
          python -m django showmigrations temples

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q
