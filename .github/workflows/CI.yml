name: CI
permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: nogis
            pgimage: postgres:16
            pgport: 5432
            use_gis: "0"
            disable_gis_for_tests: "1"
          - name: postgis
            pgimage: postgis/postgis:16-3.4
            pgport: 5433
            use_gis: "1"
            disable_gis_for_tests: "0"
    name: python (${{ matrix.name }})

    services:
      db:
        image: ${{ matrix.pgimage }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jinja_db
        ports:
          - "${{ matrix.pgport }}:5432"
        options: >-
          --health-cmd="pg_isready -U postgres -d jinja_db -p 5432"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    env:
      PYTHONPATH: backend
      DJANGO_SETTINGS_MODULE: shrine_project.settings
      DATABASE_URL: postgresql://postgres:postgres@localhost:${{ matrix.pgport }}/jinja_db
      USE_SQLITE: "0"
      USE_GIS: ${{ matrix.use_gis }}
      DISABLE_GIS_FOR_TESTS: ${{ matrix.disable_gis_for_tests }}
      IS_PYTEST: "1"

    steps:
      - uses: actions/checkout@v4

      # Node/pnpm（Web契約テストやtypecheck等がある場合のため）
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Upgrade pip
        run: python -m pip install -U pip

      # GISジョブのみ、GDAL/GEOSを追加
      - name: Install system deps (GIS only)
        if: matrix.use_gis == '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev

      # GDAL/GEOS のパスを環境にエクスポート（GISのみ）
      - name: Export GDAL path (GIS only)
        if: matrix.use_gis == '1'
        run: |
          echo "GEOS_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/libgeos_c.so" >> $GITHUB_ENV
          echo "GDAL_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/libgdal.so" >> $GITHUB_ENV

      - name: Install Python deps (base)
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install dev dependencies (tests)
        working-directory: backend
        run: |
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-django pytest-cov
          fi

      - name: Wait for DB
        run: |
          for i in {1..90}; do
            pg_isready -h localhost -p ${{ matrix.pgport }} -U postgres -d jinja_db && break
            sleep 1
          done

      - name: Enable PostGIS extension (GIS only)
        if: matrix.use_gis == '1'
        run: |
          PGPASSWORD=postgres psql \
            -h localhost -p ${{ matrix.pgport }} -U postgres -d jinja_db \
            -c "CREATE EXTENSION IF NOT EXISTS postgis;" \
            -c "SELECT postgis_version();"

      - name: Django migrate
        working-directory: backend
        run: python -m django migrate --noinput

      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: mypy (soft-fail)
        run: mypy . || true

  # 無条件で動く診断ジョブ
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Show GitHub context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "actor=${{ github.actor }}"
