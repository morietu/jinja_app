name: CI
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit (no GIS)
    uses: ./.github/workflows/backend-tests.yml
    with:
      concierge_throttle: "1000/min"
      use_gis: false
    secrets: inherit

  integration:
    name: Integration (GIS/Postgres)
    needs: unit
    uses: ./.github/workflows/backend-tests.yml
    with:
      concierge_throttle: "1000/min"
      use_gis: true
    secrets: inherit

  web:
    name: Web (lint, e2e, storybook)
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) Node を入れる（ここでは cache を使わない）
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2) pnpm を PATH に入れる（standalone で確実に）
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          standalone: true
          run_install: false

      # 3) pnpm ストアをキャッシュ
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Show pnpm
        run: |
          which pnpm || true
          pnpm -v || true
          echo "PATH=$PATH"

      - name: Install deps (workspace root)
        run: pnpm -w install --frozen-lockfile

      - name: Lint (workspace)
        run: pnpm -w run lint

      - name: E2E (apps/web)
        run: pnpm -w run e2e:web

      - name: Build Storybook
        working-directory: apps/web
        run: pnpm build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/web/storybook-static
          retention-days: 7
