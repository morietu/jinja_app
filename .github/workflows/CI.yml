name: CI (retired)
on:
  workflow_call:

jobs:
  # 未追跡ファイルのガード
  repo-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on untracked files
        run: |
          UNTRACKED="$(git ls-files --others --exclude-standard)"
          if [ -n "$UNTRACKED" ]; then
            echo "⚠️ Untracked files found:"
            echo "$UNTRACKED"
            exit 1
          fi

  # 既存の backend 再利用呼び出しをガードに依存させる
  backend:
    needs: repo-sanity
    uses: ./.github/workflows/backend-tests.yml
    with:
      mode: integration
      concierge_throttle: "1000/min"
