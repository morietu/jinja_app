name: CI
permissions:
  contents: read

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit (no GIS)
    uses: ./.github/workflows/backend-tests.yml
    with:
      concierge_throttle: "1000/min"
      use_gis: false
    secrets: inherit

  integration:
    name: Integration (GIS/Postgres)
    needs: unit
    uses: ./.github/workflows/backend-tests.yml
    with:
      concierge_throttle: "1000/min"
      use_gis: true
    secrets: inherit

  web:
    name: Web (lint, e2e, storybook)
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'             # 依存キャッシュのみ（pnpm本体は入らない）

      # ✅ pnpm を確実に PATH に導入（corepack は使わない）
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          run_install: false

      - name: Show versions
        run: |
          node -v
          pnpm -v
          which pnpm
          echo "PATH=$PATH"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint (workspace)
        run: pnpm -w run lint

      - name: E2E (apps/web)
        run: pnpm -w run e2e:web

      - name: Build Storybook
        working-directory: apps/web
        run: pnpm build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/web/storybook-static
          retention-days: 7
