name: CI
permissions:
  contents: read

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit (no GIS)
    uses: ./.github/workflows/backend-tests.yml
    with:
      concierge_throttle: "1000/min"
      use_gis: false
    secrets: inherit

  integration:
    name: Integration (GIS/Postgres)
    needs: unit
    uses: ./.github/workflows/backend-tests.yml
    with:
      concierge_throttle: "1000/min"
      use_gis: true
    secrets: inherit
