version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    groups:
      web-deps:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
          - "@storybook/*"
          - "storybook"
          - "lucide-react"
          - "@typescript-eslint/*"
          - "typescript-eslint"

  - package-ecosystem: "npm"
    directory: "/apps/mobile"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    ignore:
      - dependency-name: "@babel/core"
    groups:
      mobile-deps:
        patterns:
          - "expo*"
          - "react-native*"

  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "Django"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
