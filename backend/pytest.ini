[pytest]
DJANGO_SETTINGS_MODULE = shrine_project.settings
django_find_project = true
python_files = test_*.py *_tests.py
addopts = -vv -ra --maxfail=1 --durations=10
testpaths =
    temples/tests
    users/tests
    tests

pythonpath = backend

norecursedirs = .venv venv backend/.venv node_modules .git

filterwarnings =
    ignore:CheckConstraint\.check is deprecated.*:django.utils.deprecation.RemovedInDjango60Warning
    ignore:Cache key contains characters that will cause errors if used with memcached:django.core.cache.backends.base.CacheKeyWarning

markers =
    slow: slow tests that can be skipped locally
    postgis: tests requiring PostGIS
    gis: Tests that require GDAL/GEOS/PostGIS (run only on GIS job)
