      parameters:
      - in: query
        name: lang
        schema:
          type: string
          default: ja
          minLength: 1
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 20
          minimum: 1
          default: 5
      - in: query
        name: q
        schema:
          type: string
          maxLength: 200
          minLength: 1
        required: true
      tags:
      - geocodes
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
