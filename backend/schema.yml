  /api/concierge/chat/:
    post:
      operationId: api_concierge_chat_create
      description: message もしくは query を受け付ける互換ラッパ
      summary: Concierge chat (compat)
      tags:
      - concierge
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
            examples:
              WithMessage:
                value:
                  message: 神社を教えて
                  lat: 35.0
                  lng: 139.0
                summary: with message
              WithQuery:
                value:
                  query: 浅草神社
                  lat: 35.71
                  lng: 139.8
                summary: with query
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                WithMessage:
                  value:
                    message: 神社を教えて
                    lat: 35.0
                    lng: 139.0
                  summary: with message
                WithQuery:
                  value:
                    query: 浅草神社
                    lat: 35.71
                    lng: 139.8
                  summary: with query
          description: ''
