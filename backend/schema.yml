components:
  schemas:
    BillingStatus:
      type: object
      properties:
        plan:
          $ref: '#/components/schemas/PlanEnum'
        is_active:
          type: boolean
        provider:
          $ref: '#/components/schemas/ProviderEnum'
        current_period_end:
          type: string
          format: date-time
          nullable: true
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        cancel_at_period_end:
          type: boolean
      required:
      - cancel_at_period_end
      - is_active
      - plan
      - provider
    BlankEnum:
      enum:
      - ''
    CategoryEnum:
      enum:
      - ご利益
      - 神格
      - 地域
      type: string
      description: |-
        * `ご利益` - 願望・テーマ別
        * `神格` - 祭神の種類
        * `地域` - 地域や役割
    ConciergeMessage:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
        content:
          type: string
        created_at:
          type: string
          nullable: true
      required:
      - content
      - id
      - role
    ConciergePlanRequest:
      type: object
      properties:
        query:
          type: string
        language:
          type: string
          default: ja
        locationbias:
          type: string
        transportation:
          allOf:
          - $ref: '#/components/schemas/TransportationEnum'
          default: walk
        area:
          type: string
        where:
          type: string
        location_text:
          type: string
        lat:
          type: number
          format: double
          nullable: true
        lng:
          type: number
          format: double
          nullable: true
        lon:
          type: number
          format: double
          nullable: true
        radius_m:
          type: integer
          nullable: true
        radius_km:
          type: string
          nullable: true
      required:
      - query
    ConciergePlanResponse:
      type: object
      properties:
        query:
          type: string
        transportation:
          allOf:
          - $ref: '#/components/schemas/TransportationEnum'
          default: walk
        main:
          allOf:
          - $ref: '#/components/schemas/PlaceLite'
          nullable: true
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/PlaceLite'
        route_hints:
          type: object
          additionalProperties: {}
      required:
      - query
    ConciergeThreadDetailResponse:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        last_message:
          type: string
          nullable: true
        last_message_at:
          type: string
          nullable: true
        message_count:
          type: integer
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ConciergeMessage'
        recommendations:
          nullable: true
        recommendations_v2:
          nullable: true
      required:
      - id
      - message_count
      - messages
    ConciergeThreadListItem:
      type: object
