<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shrine Route</title>
</head>

<body>
  <h1>Google マップで開く</h1>

  <p class="meta">
    {{ name }}{% if address %}<br />{{ address }}{% endif %}
  </p>

  <a href="https://www.google.com/maps/search/?api=1&query={{ name|urlencode }}" target="_blank" rel="noreferrer">
    Google マップで探す
  </a>

  {% if dest %}
  <a href="https://www.google.com/maps/dir/?api=1&destination={{ dest|urlencode }}" target="_blank" rel="noreferrer">
    ルート（座標）
  </a>
  {% elif address %}
  <a href="https://www.google.com/maps/dir/?api=1&destination={{ address|urlencode }}" target="_blank" rel="noreferrer">
    ルート（住所）
  </a>
  {% else %}
  <a href="https://www.google.com/maps/dir/?api=1&destination={{ name|urlencode }}" target="_blank" rel="noreferrer">
    ルート（名称）
  </a>
  {% endif %}

  <hr />

  <a href="javascript:history.back()">戻る</a>
</body>

</html>
